services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: legal_sandbox
      POSTGRES_USER: legal_user
      POSTGRES_PASSWORD: legal_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legal_user -d legal_sandbox"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./services/api
    environment:
      LS_DB_PATH: postgresql+asyncpg://legal_user:legal_pass@postgres:5432/legal_sandbox
      LS_CORS_ORIGINS: http://localhost,http://127.0.0.1,http://nginx
      LS_STORAGE_BACKEND: s3
      LS_S3_ENDPOINT_URL: http://minio:9000
      LS_S3_ACCESS_KEY: minioadmin
      LS_S3_SECRET_KEY: minioadmin
      LS_S3_BUCKET: legal-sandbox
      LS_REFRESH_COOKIE_SECURE: "0"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./apps/frontend
      args:
        NEXT_PUBLIC_API_BASE: /api/v1
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  minio_data:
